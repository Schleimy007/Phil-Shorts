<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phil Shorts | Studio</title>
    <link rel="shortcut icon" type="image/png" href="https://i.imgur.com/JDPRzCc.png">
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* === APPLE macOS / visionOS DESIGN SYSTEM === */
        :root {
            --apple-bg: #000000;
            --apple-glass: rgba(30, 30, 30, 0.65);
            --apple-glass-hover: rgba(45, 45, 45, 0.8);
            --apple-border: rgba(255, 255, 255, 0.1);
            --apple-blue: #0A84FF;
            --apple-red: #FF453A;
            --apple-green: #32D74B;
            --text-main: #F5F5F7;
            --text-muted: #86868B;
            --blur-heavy: blur(40px) saturate(200%);
            --easing: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        body { background: var(--apple-bg); color: var(--text-main); font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; overflow: hidden; user-select: none; margin: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .studio-container { display: grid; grid-template-columns: 280px 1fr 340px; grid-template-rows: 64px 1fr 76px; height: 100vh; gap: 1px; background: var(--apple-border); }
        
        /* Glass Panels */
        header, aside, main, footer { background: var(--apple-bg); position: relative; }

        /* === HEADER === */
        .studio-header { grid-column: 1 / 4; display: flex; align-items: center; padding: 0 30px; justify-content: space-between; z-index: 100; -webkit-app-region: drag; }
        .studio-logo { font-weight: 600; font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 12px; }
        .studio-logo img { height: 28px; border-radius: 6px; }
        
        .pill-badge { background: var(--apple-glass); backdrop-filter: var(--blur-heavy); -webkit-backdrop-filter: var(--blur-heavy); border: 1px solid var(--apple-border); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; }

        /* === SIDEBARS === */
        .studio-sidebar-left { padding: 24px; display: flex; flex-direction: column; gap: 32px; overflow-y: auto; }
        .section-title { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
        
        .apple-card { background: var(--apple-glass); backdrop-filter: var(--blur-heavy); border: 1px solid var(--apple-border); border-radius: 16px; padding: 16px; transition: all 0.3s var(--easing); cursor: pointer; display: flex; align-items: center; gap: 14px; }
        .apple-card:hover { background: var(--apple-glass-hover); transform: scale(0.98); }
        .apple-card.active { border-color: var(--apple-blue); box-shadow: 0 0 0 1px var(--apple-blue); }
        .apple-card i { font-size: 20px; color: var(--text-main); }
        .apple-card.active i { color: var(--apple-blue); }
        
        /* === MAIN PREVIEW === */
        .studio-main { display: flex; justify-content: center; align-items: center; padding: 30px; position: relative; }
        .preview-wrapper { width: 100%; max-width: 1000px; aspect-ratio: 16/9; background: #000; border-radius: 20px; border: 1px solid var(--apple-border); overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: all 0.4s var(--easing); }
        #studio-preview { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
        
        .mac-controls { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--apple-border); }
        .mac-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 16px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .mac-btn:hover { background: rgba(255,255,255,0.2); }
        .mac-btn:active { transform: scale(0.9); }
        .mac-btn.danger { color: var(--apple-red); background: rgba(255, 69, 58, 0.15); }

        /* === CHAT (RIGHT SIDEBAR) === */
        .studio-sidebar-right { display: flex; flex-direction: column; background: var(--apple-bg); }
        .pinned-msg { background: rgba(10, 132, 255, 0.1); border-bottom: 1px solid var(--apple-border); padding: 12px 20px; font-size: 12px; color: var(--apple-blue); display: none; align-items: center; gap: 10px; }
        
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 6px; }
        .mac-chat-msg { padding: 6px 10px; border-radius: 8px; font-size: 13px; line-height: 1.4; transition: 0.2s; cursor: context-menu; display: flex; flex-direction: column; }
        .mac-chat-msg:hover { background: var(--apple-glass); }
        .mac-chat-msg strong { color: var(--text-main); font-weight: 600; cursor: pointer; }
        .mac-chat-msg strong:hover { text-decoration: underline; }
        
        .chat-input-bar { padding: 16px 20px; border-top: 1px solid var(--apple-border); display: flex; gap: 10px; }
        .mac-input { flex: 1; background: var(--apple-glass); border: 1px solid var(--apple-border); color: white; padding: 10px 16px; border-radius: 20px; font-size: 13px; outline: none; transition: 0.2s; }
        .mac-input:focus { border-color: var(--apple-blue); }

        /* === FOOTER STATS === */
        .studio-footer { grid-column: 1 / 4; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .stat-block { display: flex; gap: 30px; }
        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-item strong { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
        .stat-item span { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 500; }

        /* === MAC BUTTONS === */
        .btn-primary { background: var(--apple-blue); color: white; border: none; padding: 10px 24px; border-radius: 20px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { filter: brightness(1.1); transform: scale(0.98); }
        .btn-danger { background: var(--apple-red); }

        /* === CONTEXT MENU (macOS Style) === */
        .mac-context-menu { position: fixed; background: rgba(30, 30, 30, 0.85); backdrop-filter: var(--blur-heavy); border: 1px solid var(--apple-border); border-radius: 12px; padding: 6px; min-width: 220px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 10000; display: none; opacity: 0; transform: scale(0.95); transition: 0.15s var(--easing); }
        .mac-context-menu.active { display: flex; flex-direction: column; opacity: 1; transform: scale(1); }
        .mac-ctx-item { padding: 6px 12px; color: white; font-size: 13px; border-radius: 6px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .mac-ctx-item:hover { background: var(--apple-blue); }
        .mac-ctx-item.danger:hover { background: var(--apple-red); }
        .ctx-divider { height: 1px; background: var(--apple-border); margin: 4px 0; }

        /* === TWITCH STYLE PROFILE MODAL === */
        #profile-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 20000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s ease; }
        #profile-modal.show { display: flex; opacity: 1; }
        .profile-card { background: var(--apple-glass); backdrop-filter: var(--blur-heavy); border: 1px solid var(--apple-border); border-radius: 24px; width: 320px; padding: 24px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.6); transform: translateY(20px); transition: 0.3s var(--easing); }
        #profile-modal.show .profile-card { transform: translateY(0); }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--apple-border); margin: 0 auto 16px; object-fit: cover; }
        .profile-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .profile-role { font-size: 12px; color: var(--apple-blue); font-weight: 600; text-transform: uppercase; margin-bottom: 20px; }
        .profile-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-sec { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px; border-radius: 10px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .btn-sec:hover { background: rgba(255,255,255,0.2); }

        /* Mac Notification Toast */
        .mac-toast { position: fixed; top: 20px; right: 20px; background: var(--apple-glass); backdrop-filter: var(--blur-heavy); border: 1px solid var(--apple-border); padding: 16px 20px; border-radius: 16px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: 0.4s var(--easing); z-index: 30000; }
        .mac-toast.show { transform: translateX(0); }
    </style>
</head>
<body>

<div id="mac-toast" class="mac-toast"><i class="fas fa-info-circle" style="color:var(--apple-blue)"></i> <span id="toast-msg"></span></div>

<div id="mac-context-menu" class="mac-context-menu">
    <div class="mac-ctx-item" id="ctx-open-profile"><i class="fas fa-user-circle"></i> Profil ansehen</div>
    <div class="mac-ctx-item" id="ctx-pin"><i class="fas fa-thumbtack"></i> Nachricht anheften</div>
    <div class="ctx-divider"></div>
    <div class="mac-ctx-item" id="ctx-mod"><i class="fas fa-shield-alt"></i> Moderator machen</div>
    <div class="mac-ctx-item" id="ctx-timeout"><i class="fas fa-clock"></i> Timeout (5 Min)</div>
    <div class="ctx-divider"></div>
    <div class="mac-ctx-item danger" id="ctx-delete"><i class="fas fa-trash"></i> Nachricht löschen</div>
    <div class="mac-ctx-item danger" id="ctx-ban"><i class="fas fa-ban"></i> Aus Stream verbannen</div>
</div>

<div id="profile-modal" onclick="if(event.target===this) this.classList.remove('show')">
    <div class="profile-card">
        <img src="https://i.imgur.com/JDPRzCc.png" class="profile-avatar" id="pm-avatar">
        <div class="profile-name" id="pm-name">Username</div>
        <div class="profile-role" id="pm-role">Zuschauer</div>
        <div class="profile-actions">
            <button class="btn-sec" onclick="macToast('Nachricht gesendet')"><i class="fas fa-envelope"></i> Flüstern</button>
            <button class="btn-sec" style="color:var(--apple-blue)" id="pm-btn-mod"><i class="fas fa-shield"></i> Mod</button>
            <button class="btn-sec" style="color:#ff9f0a" id="pm-btn-timeout"><i class="fas fa-clock"></i> Timeout</button>
            <button class="btn-sec" style="color:var(--apple-red)" id="pm-btn-ban"><i class="fas fa-ban"></i> Bann</button>
        </div>
    </div>
</div>

<div class="studio-container" id="main-ui">
    <header class="studio-header">
        <div class="studio-logo"><img src="https://i.imgur.com/JDPRzCc.png"> Studio</div>
        <div class="pill-badge" id="stream-status"><i class="fas fa-circle" style="color:var(--text-muted); font-size:8px;"></i> Bereit</div>
        <button id="master-live-btn" class="btn-primary">Go Live</button>
    </header>

    <aside class="studio-sidebar-left" id="left-sidebar">
        <div>
            <div class="section-title">Videoquellen</div>
            <div class="apple-card active" data-scene="cam" onclick="switchScene('cam')">
                <i class="fas fa-camera"></i>
                <div><strong style="display:block; font-size:14px;">Kamera</strong><span style="font-size:11px; color:var(--text-muted);">FaceTime HD</span></div>
            </div>
            <div class="apple-card" style="margin-top:10px;" data-scene="screen" onclick="switchScene('screen')">
                <i class="fas fa-desktop"></i>
                <div><strong style="display:block; font-size:14px;">Bildschirm</strong><span style="font-size:11px; color:var(--text-muted);">Display Capture</span></div>
            </div>
        </div>

        <div>
            <div class="section-title">Schnellaktionen</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-sec" onclick="startPoll()"><i class="fas fa-poll"></i> Umfrage</button>
                <button class="btn-sec" onclick="clearChat()"><i class="fas fa-broom"></i> Chat leeren</button>
            </div>
        </div>
    </aside>

    <main class="studio-main">
        <div class="preview-wrapper" id="preview-box">
            <video id="studio-preview" autoplay muted playsinline></video>
            
            <div class="mac-controls">
                <button class="mac-btn" id="toggle-mic" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
                <button class="mac-btn" id="toggle-vid" onclick="toggleVid()"><i class="fas fa-video"></i></button>
                <div style="width:1px; background:var(--apple-border); margin: 0 5px;"></div>
                <button class="mac-btn" onclick="toggleCinema()" title="Kino Modus"><i class="fas fa-expand"></i></button>
                <button class="mac-btn" onclick="requestPiP()" title="Bild in Bild"><i class="fas fa-clone"></i></button>
            </div>
        </div>
    </main>

    <aside class="studio-sidebar-right" id="right-sidebar">
        <div id="pinned-msg-bar" class="pinned-msg"><i class="fas fa-thumbtack"></i> <span id="pinned-text"></span> <i class="fas fa-times" style="margin-left:auto; cursor:pointer;" onclick="document.getElementById('pinned-msg-bar').style.display='none'"></i></div>
        
        <div id="studio-chat" class="chat-area"></div>
        
        <div class="chat-input-bar">
             <input type="text" id="studio-chat-input" class="mac-input" placeholder="Nachricht senden...">
             <button onclick="sendHostMessage()" class="btn-primary" style="padding:10px 16px;"><i class="fas fa-arrow-up"></i></button>
        </div>
    </aside>

    <footer class="studio-footer">
        <div class="stat-block">
            <div class="stat-item"><strong><i class="fas fa-users" style="color:var(--text-muted); font-size:14px;"></i> <span id="stat-viewers" style="color:white; font-size:18px;">0</span></strong><span>Zuschauer</span></div>
            <div class="stat-item"><strong><i class="fas fa-star" style="color:#FF9F0A; font-size:14px;"></i> <span id="stat-coins" style="color:white; font-size:18px;">0</span></strong><span>Coins</span></div>
        </div>
        <div class="stat-block">
            <div class="stat-item"><strong><span id="stat-duration" style="color:white; font-size:18px;">00:00</span></strong><span>Dauer</span></div>
            <div class="stat-item"><strong><i class="fas fa-circle" style="color:var(--apple-green); font-size:12px;"></i></strong><span>Exzellent</span></div>
        </div>
    </footer>
</div>

<script type="module" src="studio.js"></script>
</body>
</html>
