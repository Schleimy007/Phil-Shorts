<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phil Shorts | Creator Studio Ultra PRO</title>
    <link rel="shortcut icon" type="image/png" href="https://i.imgur.com/JDPRzCc.png">
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* === APPLE / GLASSMORPHISM STUDIO DESIGN === */
        :root {
            /* Hintergrund & Glas */
            --bg-base: #000000;
            --glass-bg: rgba(30, 30, 35, 0.45); /* Helles, transparentes Grau */
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(24px); /* Starker Apple-Blur */
            
            /* Farben */
            --ps-pink: #ff0050;       
            --ps-cyan: #00f2fe;       
            --text-main: #f5f5f7;
            --text-muted: #a1a1aa;
            
            /* Layout */
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --shadow-soft: 0 8px 30px rgba(0,0,0,0.4);
            --easing: cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Schöner, dunkler Gradient als Basis-Hintergrund, damit das Glas wirkt */
        body { 
            background: radial-gradient(circle at 10% 20%, #1a1a24 0%, var(--bg-base) 100%);
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; margin: 0; user-select: none; 
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .app-layout { 
            display: grid; 
            grid-template-columns: 280px 1fr 340px; 
            grid-template-rows: 64px 1fr; 
            height: 100vh; gap: 0; 
        }

        /* === GEMEINSAME GLAS-KLASSEN === */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
        }

        /* === HEADER === */
        .top-bar { 
            grid-column: 1 / 4; 
            border-bottom: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 24px; z-index: 100; 
        }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 15px; letter-spacing: -0.2px; }
        .brand img { height: 28px; border-radius: 6px; }
        .brand span { background: linear-gradient(135deg, var(--text-main), #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .title-box { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            border-radius: 20px; padding: 8px 16px; width: 350px; 
            display: flex; align-items: center; gap: 10px; transition: 0.3s; 
        }
        .title-box:focus-within { border-color: var(--ps-cyan); background: rgba(0,0,0,0.5); }
        .title-box input { background: transparent; border: none; color: white; width: 100%; font-size: 13px; font-weight: 500; outline: none; }

        .live-controls { display: flex; align-items: center; gap: 20px; }
        .status-dot { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .status-dot.active { color: var(--ps-pink); text-shadow: 0 0 15px rgba(255,0,80,0.6); }
        .status-dot.active i { animation: pulseLive 2s infinite; }
        @keyframes pulseLive { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .btn-live { 
            background: var(--text-main); color: #000; border: none; 
            padding: 10px 24px; border-radius: 30px; font-weight: 700; font-size: 13px; 
            cursor: pointer; transition: all 0.2s var(--easing); 
        }
        .btn-live:hover { transform: scale(1.02); box-shadow: 0 4px 15px rgba(255,255,255,0.15); }
        .btn-live:active { transform: scale(0.97); }
        .btn-live.danger { background: rgba(255,0,80,0.15); color: var(--ps-pink); border: 1px solid var(--ps-pink); }
        .btn-live.danger:hover { background: var(--ps-pink); color: white; }

        /* === LEFT SIDEBAR === */
        .left-panel { border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow-y: auto; padding: 15px 0; }
        
        .panel-section { padding: 0 20px; margin-bottom: 24px; }
        .panel-header { font-size: 11px; font-weight: 700; color: #777; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        
        .clean-input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            color: white; padding: 12px 14px; border-radius: var(--radius-md); 
            font-size: 13px; outline: none; margin-bottom: 10px; box-sizing: border-box; 
            transition: 0.2s;
        }
        .clean-input:focus { border-color: var(--ps-cyan); background: rgba(0,0,0,0.5); }
        select.clean-input { appearance: none; cursor: pointer; }

        .source-grid { display: flex; flex-direction: column; gap: 8px; }
        .source-btn { 
            background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); 
            padding: 12px 16px; border-radius: var(--radius-md); cursor: pointer; 
            display: flex; align-items: center; gap: 14px; transition: all 0.2s var(--easing); 
        }
        .source-btn:hover { background: rgba(255,255,255,0.05); }
        .source-btn.active { background: rgba(0,242,254,0.1); border-color: var(--ps-cyan); }
        .source-btn i { font-size: 16px; color: var(--text-muted); width: 20px; text-align: center; }
        .source-btn.active i { color: var(--ps-cyan); }
        .source-info { display: flex; flex-direction: column; gap: 3px; }
        .source-info strong { font-size: 13px; color: var(--text-main); font-weight: 600; }
        .source-info span { font-size: 11px; color: var(--text-muted); }

        .pad-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .pad-btn { 
            background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); 
            padding: 16px 8px; border-radius: var(--radius-md); font-size: 12px; font-weight: 500; 
            color: var(--text-muted); cursor: pointer; transition: 0.15s; 
            display: flex; flex-direction: column; align-items: center; gap: 8px; 
        }
        .pad-btn i { font-size: 18px; color: var(--text-main); }
        .pad-btn:hover { background: rgba(255,255,255,0.08); color: white; }
        .pad-btn:active { background: var(--text-main); color: #000; transform: scale(0.95); }
        .pad-btn:active i { color: #000; }

        /* === CENTER (OBS STYLE MIXER & PREVIEW) === */
        .main-stage { display: flex; flex-direction: column; position: relative; padding: 24px; gap: 20px; }
        
        .stats-hud { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 10; pointer-events: none; }
        .hud-pill { 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); 
            border: 1px solid var(--glass-border); padding: 8px 16px; border-radius: 30px; 
            font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; 
            box-shadow: var(--shadow-soft); 
        }
        
        .video-container { 
            flex: 1; position: relative; background: #000; 
            border-radius: var(--radius-lg); overflow: hidden; 
            border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft); 
            display: flex; align-items: center; justify-content: center; 
        }
        #studio-preview { width: 100%; max-height: 100%; object-fit: contain; }

        #facecam-container {
            position: absolute; top: 30px; right: 30px; width: 240px; aspect-ratio: 16/9;
            border: 2px solid var(--ps-cyan); border-radius: var(--radius-sm); overflow: hidden;
            cursor: move; z-index: 500; box-shadow: var(--shadow-soft);
            resize: both; 
        }
        #facecam-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); pointer-events: none; }

        /* PRO AUDIO MIXER (Unten) */
        .obs-mixer { 
            background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); border-radius: var(--radius-lg); 
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; 
            box-shadow: var(--shadow-soft);
        }
        
        .mixer-track { display: flex; align-items: center; gap: 16px; width: 40%; }
        .track-btn { 
            width: 44px; height: 44px; border-radius: 50%; background: rgba(0,0,0,0.4); 
            border: 1px solid var(--glass-border); color: white; font-size: 16px; 
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; 
        }
        .track-btn:hover { background: rgba(255,255,255,0.1); }
        .track-btn.muted { color: var(--ps-pink); border-color: rgba(255,0,80,0.3); background: rgba(255,0,80,0.15); }
        
        .db-meter-container { flex: 1; background: rgba(0,0,0,0.6); height: 8px; border-radius: 4px; position: relative; overflow: hidden; }
        .db-meter-fill { height: 100%; width: 0%; border-radius: 4px; background: linear-gradient(90deg, #10b981 0%, #10b981 60%, #eab308 80%, #ef4444 100%); transition: width 0.05s linear; }

        .toolbar { display: flex; gap: 12px; align-items: center; }
        .tool-btn { width: 40px; height: 40px; border-radius: 50%; background: transparent; border: none; color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .tool-btn:hover { background: rgba(255,255,255,0.1); color: white; }

        /* === RIGHT SIDEBAR (CHAT) === */
        .right-panel { border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; position: relative; }
        
        .chat-header { padding: 20px; border-bottom: 1px solid var(--glass-border); font-size: 13px; font-weight: 700; color: white; display: flex; align-items: center; justify-content: space-between; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .chat-scroller { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        
        .tw-msg { padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; word-wrap: break-word; transition: 0.2s; background: rgba(255,255,255,0.02); border: 1px solid transparent; }
        .tw-msg:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border); cursor: context-menu; }
        .tw-msg .timestamp { font-size: 10px; color: #666; margin-right: 8px; }
        .tw-msg .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; color: white; margin-right: 6px; vertical-align: baseline; letter-spacing: 0.5px; }
        .tw-msg .badge.host { background: var(--ps-pink); }
        .tw-msg .badge.mod { background: #00AD03; }
        .tw-msg strong { font-weight: 600; cursor: pointer; color: var(--ps-cyan); }
        .tw-msg .text { color: #e4e4e7; }

        .chat-input-zone { padding: 20px; border-top: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); }
        .chat-input-box { display: flex; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); border-radius: 20px; padding: 4px; transition: 0.2s; }
        .chat-input-box:focus-within { border-color: var(--twitch-purp); box-shadow: 0 0 0 1px var(--twitch-purp); }
        .chat-input-box input { flex: 1; background: transparent; border: none; color: white; padding: 10px 15px; font-size: 13px; outline: none; }
        .chat-input-box button { background: var(--twitch-purp); color: white; border: none; border-radius: 16px; padding: 0 20px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .chat-input-box button:hover { background: #772ce8; }

        /* OVERLAYS & MODALS */
        .gift-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; pointer-events: none; display: flex; flex-direction: column; align-items: center; text-align: center; animation: popIn 3s ease forwards; }
        .gift-overlay span { font-size: 100px; filter: drop-shadow(0 0 30px rgba(255,215,0,0.8)); }
        .gift-overlay strong { font-size: 20px; color: white; text-shadow: 0 2px 10px black; margin-top: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); padding: 8px 20px; border-radius: 30px; border: 1px solid #ffd700; }
        @keyframes popIn { 0% { opacity:0; transform: translate(-50%, 50%) scale(0.5); } 15% { opacity:1; transform: translate(-50%, -50%) scale(1.2); } 25% { transform: translate(-50%, -50%) scale(1); } 80% { opacity:1; transform: translate(-50%, -50%) scale(1); } 100% { opacity:0; transform: translate(-50%, -150%) scale(0.8); } }

        .glass-menu { position: fixed; background: rgba(24, 24, 27, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: var(--radius-md); padding: 8px; min-width: 220px; box-shadow: var(--shadow-soft); z-index: 10000; display: none; opacity: 0; transform: scale(0.95); transition: 0.15s var(--easing); }
        .glass-menu.active { display: block; opacity: 1; transform: scale(1); }
        .menu-item { padding: 10px 14px; font-size: 13px; font-weight: 500; color: var(--text-main); cursor: pointer; border-radius: 6px; display: flex; align-items: center; gap: 12px; transition: 0.1s; }
        .menu-item:hover { background: rgba(255,255,255,0.1); }
        .menu-item.danger { color: var(--ps-pink); }
        .menu-item.danger:hover { background: var(--ps-pink); color: #fff; }
        .menu-item i { width: 16px; text-align: center; }
        .menu-divider { height: 1px; background: var(--glass-border); margin: 6px 0; }

        .system-toast { position: fixed; top: 24px; right: 24px; background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-left: 4px solid var(--ps-cyan); padding: 16px 24px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; z-index: 30000; transform: translateX(120%); transition: 0.4s var(--easing); box-shadow: var(--shadow-soft); display: flex; align-items: center; gap: 12px; }
        .system-toast.show { transform: translateX(0); }

        #viewer-card { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        #viewer-card.show { display: flex; }
        .vc-inner { background: rgba(24,24,27,0.9); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); width: 320px; overflow: hidden; box-shadow: var(--shadow-soft); animation: slideUp 0.3s var(--easing); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .vc-header { padding: 24px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--glass-border); }
        .vc-avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--ps-cyan), var(--twitch-purp)); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: white; }
        .vc-info h3 { margin: 0 0 4px 0; font-size: 18px; color: white; font-weight: 600; }
        .vc-info span { font-size: 11px; font-weight: 600; color: var(--ps-cyan); text-transform: uppercase; letter-spacing: 1px; }
        .vc-body { padding: 12px; display: flex; flex-direction: column; gap: 4px; }
        .vc-btn { background: transparent; border: none; color: var(--text-main); padding: 12px 16px; font-size: 13px; font-weight: 500; text-align: left; cursor: pointer; border-radius: var(--radius-md); display: flex; align-items: center; gap: 12px; transition: 0.15s; }
        .vc-btn:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="sys-toast" class="system-toast"><i class="fas fa-info-circle" style="color:var(--ps-cyan)"></i> <span id="toast-text"></span></div>

<div id="ctx-menu" class="glass-menu">
    <div class="menu-item" id="ctx-whisper"><i class="fas fa-envelope"></i> Flüstern (DMs)</div>
    <div class="menu-divider"></div>
    <div class="menu-item" id="ctx-mod" style="color:#10b981"><i class="fas fa-shield-alt"></i> Moderator machen</div>
    <div class="menu-item danger" id="ctx-timeout"><i class="fas fa-clock"></i> Timeout geben</div>
    <div class="menu-divider"></div>
    <div class="menu-item danger" id="ctx-delete"><i class="fas fa-trash"></i> Nachricht Löschen</div>
    <div class="menu-item danger" id="ctx-ban"><i class="fas fa-ban"></i> User Bannen</div>
</div>

<div id="viewer-card" onclick="if(event.target===this) this.classList.remove('show')">
    <div class="vc-inner">
        <div class="vc-header">
            <div class="vc-avatar" id="pm-avatar">U</div>
            <div class="vc-info">
                <h3 id="pm-name">Username</h3>
                <span id="pm-role">Zuschauer</span>
            </div>
        </div>
        <div class="vc-body">
            <button class="vc-btn" onclick="sysToast('DMs öffnen...')"><i class="fas fa-envelope"></i> Flüstern</button>
            <button class="vc-btn" id="pm-btn-mod"><i class="fas fa-shield-alt" style="color:#10b981"></i> Als Mod ernennen</button>
            <button class="vc-btn" id="pm-btn-timeout"><i class="fas fa-clock" style="color:#f59e0b"></i> Timeout (5 Min)</button>
            <button class="vc-btn" id="pm-btn-ban" style="color:var(--ps-pink)"><i class="fas fa-ban"></i> Aus Stream bannen</button>
        </div>
    </div>
</div>

<div class="app-layout">
    
    <header class="top-bar glass-panel">
        <div class="brand">
            <img src="https://i.imgur.com/JDPRzCc.png">
            <span>STUDIO PRO</span>
        </div>
        <div class="title-box">
            <i class="fas fa-pen" style="color:var(--text-muted); font-size:12px;"></i>
            <input type="text" id="stream-title" placeholder="Titel deines Streams..." value="Mein Live Stream">
        </div>
        <div class="live-controls">
            <div class="status-dot" id="live-indicator" style="display:none;"><i class="fas fa-circle"></i> Offline</div>
            <button class="btn-live" id="master-live-btn">STREAM STARTEN</button>
        </div>
    </header>

    <aside class="left-panel glass-panel" id="left-sidebar">
        
        <div class="panel-section">
            <div class="panel-header">Mikrofon Auswahl</div>
            <select id="mic-select" class="clean-input" style="cursor:pointer;">
                <option>Suche Mikrofone...</option>
            </select>
        </div>

        <div class="panel-section">
            <div class="panel-header">Szenen & Quellen</div>
            <div class="source-grid">
                <div class="source-btn active" data-scene="cam" onclick="switchScene('cam')">
                    <i class="fas fa-video"></i>
                    <div class="source-info"><strong>Kamera</strong><span>Hauptansicht</span></div>
                </div>
                <div class="source-btn" data-scene="screen" onclick="switchScene('screen')">
                    <i class="fas fa-desktop"></i>
                    <div class="source-info"><strong>Bildschirm</strong><span>Capture + Sound</span></div>
                </div>
                <div class="source-btn" data-scene="pip" onclick="switchScene('pip')">
                    <i class="fas fa-th-large"></i>
                    <div class="source-info"><strong>Game + Facecam</strong><span>PiP Modus</span></div>
                </div>
            </div>
        </div>

        <div class="panel-section">
            <div class="panel-header">Live Ziele</div>
            <div style="background: rgba(255,215,0,0.05); padding: 15px; border-radius: var(--radius-md); border: 1px solid rgba(255,215,0,0.2);">
                <input type="number" id="goal-target" class="clean-input" placeholder="Ziel in Coins (z.B. 1000)" style="margin-bottom:10px;">
                <input type="text" id="goal-desc" class="clean-input" placeholder="Belohnung (z.B. Chili essen)" style="margin-bottom:15px;">
                <button class="source-btn" style="width:100%; justify-content:center; margin:0; background: rgba(255,215,0,0.1); color: #ffd700; border-color: rgba(255,215,0,0.3);" onclick="updateLiveGoal()"><i class="fas fa-sync-alt"></i> Ziel aktualisieren</button>
            </div>
        </div>

        <div class="panel-section">
            <div class="panel-header">Admin Tools</div>
            <button class="source-btn" style="width:100%; color:var(--ps-pink);" onclick="clearChat()"><i class="fas fa-trash"></i> Chat komplett leeren</button>
        </div>

        <div class="panel-section" style="margin-top:auto; margin-bottom: 0;">
            <div class="panel-header">Audio Pad</div>
            <div class="pad-grid">
                <button class="pad-btn" onclick="playEffect('applaus')"><i class="fas fa-hands-clapping"></i> Applaus</button>
                <button class="pad-btn" onclick="playEffect('airhorn')"><i class="fas fa-bullhorn"></i> Airhorn</button>
                <button class="pad-btn" onclick="playEffect('laugh')"><i class="fas fa-face-laugh-squint"></i> Lachen</button>
                <button class="pad-btn" onclick="playEffect('wow')"><i class="fas fa-star"></i> Wow</button>
            </div>
        </div>
    </aside>

    <main class="main-stage">
        <div class="stats-hud">
            <div class="hud-pill"><i class="fas fa-eye" style="color:var(--ps-pink)"></i> <span id="stat-viewers">0</span></div>
            <div class="hud-pill"><i class="fas fa-coins" style="color:#ffd700"></i> <span id="stat-coins">0</span></div>
            <div class="hud-pill"><i class="fas fa-clock" style="color:var(--ps-cyan)"></i> <span id="stat-duration">00:00</span></div>
        </div>

        <div id="gift-overlay-zone" style="position:absolute; width:100%; height:100%; top:0; left:0; pointer-events:none; z-index:1000; overflow:hidden;"></div>

        <div class="video-container" id="preview-viewport">
            <video id="studio-preview" autoplay muted playsinline></video>
            
            <div id="facecam-container" style="display: none;">
                <video id="facecam-video" autoplay muted playsinline></video>
            </div>
        </div>

        <div class="obs-mixer">
            <div class="mixer-track">
                <button class="track-btn" id="toggle-mic" onclick="toggleMic()" title="Mic (M)"><i class="fas fa-microphone"></i></button>
                <div class="db-meter-container">
                    <div class="db-meter-fill" id="mic-level"></div>
                </div>
                <span style="font-size:10px; font-weight:800; color:var(--text-muted); width:25px;">MIC</span>
            </div>
            
            <div class="toolbar">
                <i class="fas fa-volume-up" style="color:#888; font-size:14px;"></i>
                <input type="range" id="pc-volume-slider" min="0" max="1" step="0.05" value="0.5" title="PC Lautstärke für dich (Gameplay)" style="width: 80px; accent-color: var(--ps-cyan);">
                <div style="width:1px; background:var(--glass-border); height:24px; margin: 0 10px;"></div>
                <button class="tool-btn" onclick="toggleCinema()" title="Kino Modus (F)"><i class="fas fa-expand"></i></button>
                <button class="tool-btn" onclick="requestPiP()" title="Fenster Abkoppeln (P)"><i class="fas fa-clone"></i></button>
            </div>
            
            <div class="mixer-track" style="flex-direction:row-reverse;">
                <button class="track-btn" id="toggle-vid" onclick="toggleVid()" title="Cam (V)"><i class="fas fa-video"></i></button>
                <div style="flex:1;"></div>
                <span style="font-size:10px; font-weight:800; color:var(--text-muted);">VIDEO</span>
            </div>
        </div>
    </main>

    <aside class="right-panel glass-panel" id="right-sidebar">
        <div class="chat-header">
            <span>Live Chat</span>
            <i class="fas fa-user-friends" style="color:var(--text-muted)"></i>
        </div>
        
        <div class="chat-scroller" id="chat-scroller">
            <div id="studio-chat"></div>
        </div>
        
        <div class="chat-input-zone">
            <div class="chat-input-box">
                <input type="text" id="studio-chat-input" placeholder="Nachricht an Chat...">
                <button onclick="sendHostMessage()">Senden</button>
            </div>
        </div>
    </aside>

</div>

<canvas id="composite-canvas" width="1280" height="720" style="position:fixed; top:-9999px; visibility:hidden;"></canvas>

<script type="module" src="studio.js"></script>
</body>
</html>
