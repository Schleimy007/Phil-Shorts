<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phil Shorts | Live Studio 🎬</title>
    <link rel="shortcut icon" type="image/png" href="https://i.imgur.com/JDPRzCc.png">
    <link rel="stylesheet" href="style.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #050505; color: white; overflow: hidden; font-family: sans-serif; }
        .studio-container { display: grid; grid-template-columns: 250px 1fr 350px; grid-template-rows: 60px 1fr 80px; height: 100vh; }
        
        /* Header */
        .studio-header { grid-column: 1 / 4; background: #111; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        .studio-logo { display: flex; align-items: center; gap: 10px; font-weight: bold; color: #ff0050; }
        
        /* Sidebar Links (Szenen) */
        .studio-sidebar-left { background: #0a0a0a; border-right: 1px solid #222; padding: 20px; }
        .scene-card { background: #1a1a1a; border: 2px solid transparent; border-radius: 10px; padding: 10px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; text-align: center; }
        .scene-card.active { border-color: #00f2fe; background: #111; }
        .scene-card i { font-size: 24px; margin-bottom: 5px; display: block; }
        
        /* Mitte (Vorschau) */
        .studio-main { background: #000; display: flex; justify-content: center; align-items: center; position: relative; padding: 20px; }
        #studio-preview { width: 100%; height: 100%; object-fit: contain; background: #111; border-radius: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.5); transform: scaleX(-1); }
        .live-indicator { position: absolute; top: 40px; left: 40px; background: #ff0050; padding: 5px 15px; border-radius: 5px; font-weight: bold; animation: pulse 2s infinite; display: none; }
        
        /* Rechts (Chat & Events) */
        .studio-sidebar-right { background: #0a0a0a; border-left: 1px solid #222; display: flex; flex-direction: column; }
        .tab-bar { display: flex; background: #111; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 13px; border-bottom: 2px solid transparent; }
        .tab.active { border-color: #ff0050; color: #ff0050; }
        .chat-area { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .event-msg { background: rgba(255, 215, 0, 0.1); border-radius: 8px; padding: 10px; margin-bottom: 10px; border-left: 3px solid #ffd700; }
        
        /* Unten (Stats) */
        .studio-footer { grid-column: 1 / 4; background: #111; border-top: 1px solid #222; display: flex; align-items: center; justify-content: space-around; padding: 0 20px; }
        .stat-item { text-align: center; }
        .stat-item strong { display: block; font-size: 18px; color: #00f2fe; }
        .stat-item span { font-size: 11px; color: #888; text-transform: uppercase; }

        /* Buttons */
        .btn-live { background: #ff0050; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .btn-live.stop { background: #333; }
        
        /* Overlay controls in Preview */
        .preview-controls { position: absolute; bottom: 40px; display: flex; gap: 10px; }
        .ctrl-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        .ctrl-btn.active { color: #ff0050; background: white; }
    </style>
</head>
<body>

<div class="studio-container">
    <header class="studio-header">
        <div class="studio-logo">
            <img src="https://i.imgur.com/JDPRzCc.png" height="30">
            <span>LIVE STUDIO</span>
        </div>
        <div id="stream-title-display" style="font-weight: bold; color: #aaa;">Nicht gestartet</div>
        <button id="master-live-btn" class="btn-live">STREAM STARTEN</button>
    </header>

    <aside class="studio-sidebar-left">
        <h5 style="color:#555; margin-bottom: 15px;">SZENEN</h5>
        <div class="scene-card active" onclick="switchScene('cam')">
            <i class="fas fa-camera"></i>
            <span>Kamera</span>
        </div>
        <div class="scene-card" onclick="switchScene('screen')">
            <i class="fas fa-desktop"></i>
            <span>Bildschirm</span>
        </div>
        <div class="scene-card" onclick="switchScene('brb')">
            <i class="fas fa-clock"></i>
            <span>Pause (BRB)</span>
        </div>
        
        <hr style="border:0; border-top:1px solid #222; margin: 20px 0;">
        <h5 style="color:#555; margin-bottom: 15px;">LIVE GOAL</h5>
        <input type="text" id="goal-input" class="comment-input" placeholder="Ziel (z.B. 1000)" style="width: 100%; font-size: 12px;">
        <button class="profile-action-btn edit-btn" onclick="updateGoal()" style="width: 100%; margin-top: 10px; min-height: 30px; font-size: 12px;">Ziel aktualisieren</button>
    </aside>

    <main class="studio-main">
        <div class="live-indicator" id="live-dot">● LIVE</div>
        <video id="studio-preview" autoplay muted playsinline></video>
        
        <div class="preview-controls">
            <div class="ctrl-btn" id="toggle-mic" onclick="toggleMic()"><i class="fas fa-microphone"></i></div>
            <div class="ctrl-btn" id="toggle-vid" onclick="toggleVid()"><i class="fas fa-video"></i></div>
        </div>
    </main>

    <aside class="studio-sidebar-right">
        <div class="tab-bar">
            <div class="tab active" onclick="switchStudioTab('chat')">CHAT</div>
            <div class="tab" onclick="switchStudioTab('events')">GESCHENKE</div>
        </div>
        <div id="studio-chat" class="chat-area">
            </div>
        <div id="studio-events" class="chat-area" style="display:none;">
            </div>
        <div style="padding: 10px; background: #111;">
             <input type="text" id="studio-chat-input" class="comment-input" placeholder="Als Host antworten..." style="width: 100%;">
        </div>
    </aside>

    <footer class="studio-footer">
        <div class="stat-item">
            <strong id="stat-viewers">0</strong>
            <span>Zuschauer</span>
        </div>
        <div class="stat-item">
            <strong id="stat-coins">0</strong>
            <span>Coins (Session)</span>
        </div>
        <div class="stat-item">
            <strong id="stat-duration">00:00:00</strong>
            <span>Dauer</span>
        </div>
        <div class="stat-item">
            <strong id="stat-likes">0</strong>
            <span>Likes</span>
        </div>
    </footer>
</div>

<script type="module" src="studio.js"></script>

</body>
</html>
