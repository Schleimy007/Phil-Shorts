<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phil Shorts | Live Studio PRO 🎬</title>
    <link rel="shortcut icon" type="image/png" href="https://i.imgur.com/JDPRzCc.png">
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* === MODERN STUDIO DESIGN SYSTEM === */
        :root {
            --bg-base: #09090b;       /* Sehr dunkles Grau, fast Schwarz */
            --bg-surface: #18181b;    /* Leicht erhaben */
            --bg-elevated: #27272a;   /* Hover states */
            --border-dim: rgba(255, 255, 255, 0.08);
            --border-light: rgba(255, 255, 255, 0.15);
            --accent: #f43f5e;        /* Edles Rose-Pink */
            --accent-hover: #e11d48;
            --accent-glow: rgba(244, 63, 94, 0.15);
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --radius-md: 8px;
            --radius-lg: 12px;
            --easing: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body { background: var(--bg-base); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; user-select: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 4px; }

        .studio-container { display: grid; grid-template-columns: 260px 1fr 320px; grid-template-rows: 56px 1fr 70px; height: 100vh; }
        
        /* === HEADER === */
        .studio-header { grid-column: 1 / 4; background: var(--bg-base); border-bottom: 1px solid var(--border-dim); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; z-index: 100; }
        .studio-logo { display: flex; align-items: center; gap: 12px; font-weight: 700; color: var(--text-main); font-size: 1.1rem; letter-spacing: -0.5px; }
        .studio-logo img { border-radius: 6px; }
        
        /* === LEFT SIDEBAR === */
        .studio-sidebar-left { background: var(--bg-surface); border-right: 1px solid var(--border-dim); padding: 24px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 28px; }
        .section-title { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        .scene-card { background: transparent; border: 1px solid var(--border-dim); border-radius: var(--radius-md); padding: 12px; cursor: pointer; transition: all 0.2s var(--easing); display: flex; align-items: center; gap: 12px; }
        .scene-card:hover { background: rgba(255,255,255,0.03); border-color: var(--border-light); }
        .scene-card:active { transform: scale(0.98); }
        .scene-card.active { border-color: var(--accent); background: var(--accent-glow); }
        .scene-card i { font-size: 18px; color: var(--text-muted); width: 24px; text-align: center; transition: color 0.2s ease; }
        .scene-card.active i { color: var(--accent); }
        .scene-card strong { font-size: 13px; font-weight: 600; }
        .scene-card span { font-size: 11px; color: var(--text-muted); }
        
        .soundboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .snd-btn { background: transparent; border: 1px solid var(--border-dim); color: var(--text-muted); padding: 10px; border-radius: var(--radius-md); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s ease; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .snd-btn i { font-size: 16px; }
        .snd-btn:hover { background: var(--bg-elevated); color: var(--text-main); }
        .snd-btn:active { background: var(--accent); border-color: var(--accent); color: white; transform: scale(0.96); }

        /* === MAIN PREVIEW === */
        .studio-main { background: var(--bg-base); display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 40px; }
        
        .preview-wrapper { position: relative; width: 100%; max-width: 960px; aspect-ratio: 16/9; background: #000; border-radius: var(--radius-lg); box-shadow: 0 8px 32px rgba(0,0,0,0.4); border: 1px solid var(--border-dim); overflow: hidden; }
        #studio-preview { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); transition: opacity 0.3s ease; }
        
        .live-indicator { position: absolute; top: 16px; left: 16px; background: rgba(244, 63, 94, 0.9); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 12px; letter-spacing: 0.5px; animation: pulseFade 2s infinite var(--easing); display: none; z-index: 10; border: 1px solid rgba(255,255,255,0.1); }
        @keyframes pulseFade { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        
        .preview-controls { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 20; background: rgba(24, 24, 27, 0.75); padding: 8px 16px; border-radius: 100px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border-dim); }
        
        .ctrl-btn { width: 40px; height: 40px; border-radius: 50%; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-size: 16px; color: var(--text-main); transition: all 0.2s ease; }
        .ctrl-btn:hover { background: rgba(255,255,255,0.1); }
        .ctrl-btn:active { transform: scale(0.92); }
        .ctrl-btn.muted { color: var(--accent); background: var(--accent-glow); }
        
        .audio-meter { width: 4px; height: 24px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; display: flex; align-items: flex-end; margin: auto 8px; }
        #mic-level-bar { width: 100%; height: 0%; background: #10b981; transition: height 0.08s ease-out; }

        /* === RIGHT SIDEBAR (CHAT) === */
        .studio-sidebar-right { background: var(--bg-surface); border-left: 1px solid var(--border-dim); display: flex; flex-direction: column; }
        .tab-bar { display: flex; border-bottom: 1px solid var(--border-dim); }
        .tab { flex: 1; padding: 16px; text-align: center; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text-muted); transition: all 0.2s ease; border-bottom: 2px solid transparent; }
        .tab:hover { color: var(--text-main); background: rgba(255,255,255,0.02); }
        .tab.active { color: var(--text-main); border-bottom-color: var(--text-main); }
        
        .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }
        
        /* Smoother Chat Design */
        .chat-msg { padding: 4px 8px; border-radius: 6px; font-size: 13px; line-height: 1.5; color: #d4d4d8; transition: background 0.15s ease; word-wrap: break-word; animation: slideUp 0.2s var(--easing); border: 1px solid transparent; }
        .chat-msg:hover { background: rgba(255,255,255,0.03); border-color: var(--border-dim); cursor: context-menu; }
        .chat-msg strong { color: #38bdf8; font-weight: 600; margin-right: 4px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .event-msg { background: var(--accent-glow); color: var(--accent); padding: 8px 12px; border-radius: var(--radius-md); font-size: 12px; font-weight: 500; margin: 4px 0; animation: slideUp 0.3s var(--easing); border-left: 2px solid var(--accent); }

        .chat-input-box { padding: 16px; background: var(--bg-surface); border-top: 1px solid var(--border-dim); display: flex; gap: 8px; }
        .clean-input { flex: 1; background: var(--bg-base); border: 1px solid var(--border-dim); color: var(--text-main); padding: 10px 14px; border-radius: var(--radius-md); font-size: 13px; outline: none; transition: border 0.2s ease; }
        .clean-input:focus { border-color: var(--border-light); }
        
        .send-btn { background: var(--text-main); color: var(--bg-base); border: none; width: 36px; border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s ease; display: flex; align-items: center; justify-content: center; }
        .send-btn:hover { background: #fff; transform: translateY(-1px); }
        .send-btn:active { transform: scale(0.95); }

        /* === FOOTER === */
        .studio-footer { grid-column: 1 / 4; background: var(--bg-base); border-top: 1px solid var(--border-dim); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
        
        .stats-container { display: flex; gap: 32px; }
        .stat-item { display: flex; align-items: center; gap: 10px; }
        .stat-item i { color: var(--text-muted); font-size: 14px; }
        .stat-info { display: flex; align-items: baseline; gap: 6px; }
        .stat-info strong { font-size: 15px; font-weight: 600; color: var(--text-main); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
        .stat-info span { font-size: 11px; color: var(--text-muted); font-weight: 500; }

        .btn-live { background: var(--text-main); color: var(--bg-base); border: none; padding: 10px 24px; border-radius: 100px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-size: 13px; }
        .btn-live:hover { background: #fff; box-shadow: 0 4px 12px rgba(255,255,255,0.1); }
        .btn-live:active { transform: scale(0.96); }
        .btn-live.stop { background: rgba(244, 63, 94, 0.1); color: var(--accent); border: 1px solid rgba(244, 63, 94, 0.2); }
        .btn-live.stop:hover { background: rgba(244, 63, 94, 0.2); border-color: var(--accent); }

        /* === GLASS CONTEXT MENU === */
        .studio-context-menu { position: fixed; background: rgba(24, 24, 27, 0.85); backdrop-filter: blur(16px) saturate(180%); -webkit-backdrop-filter: blur(16px) saturate(180%); border: 1px solid var(--border-dim); border-radius: var(--radius-md); padding: 6px; min-width: 200px; box-shadow: 0 12px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05); z-index: 10000; display: none; opacity: 0; flex-direction: column; transform: scale(0.98) translateY(4px); transform-origin: top left; transition: opacity 0.15s ease, transform 0.15s var(--easing); }
        .studio-context-menu.active { display: flex; opacity: 1; transform: scale(1) translateY(0); }
        .ctx-item { padding: 8px 12px; color: var(--text-main); font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 10px; transition: 0.1s ease; }
        .ctx-item:hover { background: rgba(255, 255, 255, 0.06); }
        .ctx-item.danger { color: var(--accent); }
        .ctx-item.danger:hover { background: var(--accent-glow); }
        .ctx-item i { font-size: 14px; opacity: 0.7; width: 16px; text-align: center; }
        .ctx-divider { height: 1px; background: var(--border-dim); margin: 4px 0; }
    </style>
</head>
<body>

<div id="studio-context-menu" class="studio-context-menu">
    <div class="ctx-item" id="ctx-profile"><i class="fas fa-user"></i> Profil ansehen</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" id="ctx-mod"><i class="fas fa-shield-alt"></i> Moderator machen</div>
    <div class="ctx-item danger" id="ctx-delete"><i class="fas fa-trash"></i> Nachricht löschen</div>
    <div class="ctx-item danger" id="ctx-ban"><i class="fas fa-ban"></i> User blockieren</div>
</div>

<div class="studio-container">
    <header class="studio-header">
        <div class="studio-logo">
            <img src="https://i.imgur.com/JDPRzCc.png" height="24">
            Studio
        </div>
        <div id="stream-status-text" style="font-size: 12px; color: var(--text-muted); font-weight: 500;">
            <i class="fas fa-circle" style="font-size:8px; vertical-align:middle; margin-right:6px; opacity: 0.5;"></i> Offline
        </div>
        <button id="master-live-btn" class="btn-live">Go Live</button>
    </header>

    <aside class="studio-sidebar-left">
        <div>
            <div class="section-title">Szenen</div>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <div class="scene-card active" data-scene="cam" onclick="switchScene('cam')">
                    <i class="fas fa-video"></i>
                    <div style="display:flex; flex-direction:column;"><strong>Kamera</strong><span>Standard</span></div>
                </div>
                <div class="scene-card" data-scene="screen" onclick="switchScene('screen')">
                    <i class="fas fa-display"></i>
                    <div style="display:flex; flex-direction:column;"><strong>Bildschirm</strong><span>Teilen</span></div>
                </div>
            </div>
        </div>
        
        <div>
            <div class="section-title">Audio Pad</div>
            <div class="soundboard-grid">
                <button class="snd-btn" onclick="playEffect('applaus')"><i class="fas fa-hands-clapping"></i> Applaus</button>
                <button class="snd-btn" onclick="playEffect('airhorn')"><i class="fas fa-bullhorn"></i> Airhorn</button>
                <button class="snd-btn" onclick="playEffect('laugh')"><i class="fas fa-face-laugh-squint"></i> Lachen</button>
                <button class="snd-btn" onclick="playEffect('wow')"><i class="fas fa-star"></i> Wow</button>
            </div>
        </div>

        <div>
            <div class="section-title">Overlay</div>
            <input type="text" id="banner-input" class="clean-input" placeholder="Text im Stream anzeigen..." style="width: 100%; margin-bottom: 8px;">
            <button class="btn-live" onclick="setLiveBanner()" style="width: 100%; background: var(--bg-elevated); color: var(--text-main);">Aktualisieren</button>
        </div>
    </aside>

    <main class="studio-main">
        <div class="preview-wrapper">
            <div class="live-indicator" id="live-dot">LIVE</div>
            <video id="studio-preview" autoplay muted playsinline></video>
            
            <div class="preview-controls">
                <button class="ctrl-btn" id="toggle-mic" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
                <div class="audio-meter"><div id="mic-level-bar"></div></div>
                <button class="ctrl-btn" id="toggle-vid" onclick="toggleVid()"><i class="fas fa-video"></i></button>
            </div>
        </div>
        <div style="position:absolute; bottom:16px; font-size:11px; color:var(--text-muted);">Shortcuts: M (Mute) · V (Video) · S (Szene)</div>
    </main>

    <aside class="studio-sidebar-right">
        <div class="tab-bar">
            <div class="tab active" onclick="switchStudioTab('chat')">Chat</div>
            <div class="tab" onclick="switchStudioTab('events')">Aktivität</div>
        </div>
        <div id="studio-chat" class="chat-area"></div>
        <div id="studio-events" class="chat-area" style="display:none;"></div>
        <div class="chat-input-box">
             <input type="text" id="studio-chat-input" class="clean-input" placeholder="Nachricht senden...">
             <button onclick="sendHostMessage()" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </aside>

    <footer class="studio-footer">
        <div class="stats-container">
            <div class="stat-item">
                <i class="fas fa-users"></i>
                <div class="stat-info"><strong id="stat-viewers">0</strong><span>Zuschauer</span></div>
            </div>
            <div class="stat-item">
                <i class="fas fa-coins" style="color: #fbbf24;"></i>
                <div class="stat-info"><strong id="stat-coins" style="color: #fbbf24;">0</strong><span>Coins</span></div>
            </div>
        </div>
        <div class="stats-container">
            <div class="stat-item">
                <i class="fas fa-clock"></i>
                <div class="stat-info"><strong id="stat-duration">00:00</strong><span>Dauer</span></div>
            </div>
            <div class="stat-item">
                <i class="fas fa-wifi" style="color: #10b981;"></i>
                <div class="stat-info"><strong id="stat-health" style="color: #10b981;">Optimal</strong><span>Verbindung</span></div>
            </div>
        </div>
    </footer>
</div>

<script type="module" src="studio.js"></script>
</body>
</html>
