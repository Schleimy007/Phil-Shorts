<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phil Shorts | GlassCord Studio</title>
    <link rel="shortcut icon" type="image/png" href="https://i.imgur.com/JDPRzCc.png">
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* === DISCORD x APPLE HYBRID DESIGN SYSTEM === */
        :root {
            /* Discord Colors */
            --bg-base: #1e1f22;       /* Discord Dark Background */
            --bg-panel: rgba(43, 45, 49, 0.75); /* Discord Panel + Apple Glass */
            --bg-hover: rgba(64, 66, 73, 0.6);
            --bg-active: rgba(78, 80, 88, 0.6);
            --blurple: #5865F2;       /* Discord Brand Color */
            --blurple-hover: #4752C4;
            --green: #23a559;         /* Discord Voice/Online Green */
            --red: #da373c;           /* Discord Danger Red */
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --text-header: #f2f3f5;
            
            /* Apple Effects */
            --glass-blur: blur(24px) saturate(150%);
            --radius-md: 8px;
            --radius-lg: 16px;
            --easing: cubic-bezier(0.2, 0.8, 0.2, 1);
            --border-subtle: 1px solid rgba(255, 255, 255, 0.05);
        }

        body { background: var(--bg-base); color: var(--text-normal); font-family: "gg sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; user-select: none; margin: 0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #2b2d31; }

        /* Floating Layout */
        .studio-wrapper { display: flex; height: 100vh; padding: 12px; gap: 12px; box-sizing: border-box; }
        
        .glass-panel { background: var(--bg-panel); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: var(--border-subtle); border-radius: var(--radius-lg); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

        /* === LEFT: SCENES & SOUNDS (DISCORD SERVER/CHANNEL BAR STYLE) === */
        .sidebar-left { width: 280px; display: flex; flex-direction: column; padding: 16px; flex-shrink: 0; }
        
        .discord-header { display: flex; align-items: center; justify-content: space-between; border-bottom: var(--border-subtle); padding-bottom: 12px; margin-bottom: 16px; }
        .discord-header h1 { font-size: 16px; color: var(--text-header); font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px; }
        .discord-header img { height: 20px; border-radius: 4px; }
        
        .section-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin: 16px 0 8px 4px; letter-spacing: 0.5px; }

        .discord-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: var(--radius-md); cursor: pointer; color: var(--text-muted); transition: all 0.2s var(--easing); font-weight: 500; font-size: 15px; }
        .discord-item:hover { background: var(--bg-hover); color: var(--text-normal); }
        .discord-item:active { transform: scale(0.97); } /* Apple Taptic */
        .discord-item.active { background: var(--bg-active); color: var(--text-header); }
        .discord-item i { font-size: 18px; width: 20px; text-align: center; }
        
        .sound-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .sound-btn { background: var(--bg-hover); border: none; color: var(--text-normal); padding: 12px 8px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .sound-btn i { font-size: 16px; color: var(--blurple); }
        .sound-btn:hover { background: var(--bg-active); }
        .sound-btn:active { transform: scale(0.95); background: var(--blurple); color: white; }
        .sound-btn:active i { color: white; }

        /* === CENTER: STAGE (MAIN VIDEO) === */
        .main-stage { flex: 1; display: flex; flex-direction: column; position: relative; border-radius: var(--radius-lg); overflow: hidden; background: #000; }
        #studio-preview { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
        
        /* Discord Voice-Chat Style Controls */
        .voice-controls { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; background: rgba(20, 20, 20, 0.85); backdrop-filter: var(--glass-blur); padding: 8px 16px; border-radius: 24px; border: var(--border-subtle); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .vc-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--bg-active); border: none; color: var(--text-normal); font-size: 18px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .vc-btn:hover { background: var(--text-muted); color: #fff; }
        .vc-btn:active { transform: scale(0.9); }
        .vc-btn.danger { background: var(--text-normal); color: var(--red); }
        .vc-btn.danger:hover { background: var(--red); color: white; }
        
        /* Apple-style Live Badge */
        .live-badge { position: absolute; top: 20px; left: 20px; background: rgba(218, 55, 60, 0.9); backdrop-filter: var(--glass-blur); padding: 4px 12px; border-radius: 6px; font-weight: 700; font-size: 12px; color: white; display: none; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(218,55,60,0.4); }
        
        /* Stats Header in Video */
        .stage-header { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; justify-content: flex-end; gap: 16px; pointer-events: none; }
        .stat-pill { background: rgba(0,0,0,0.6); backdrop-filter: var(--glass-blur); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; border: var(--border-subtle); color: white; }

        /* === RIGHT: CHAT (DISCORD STYLE) === */
        .sidebar-right { width: 340px; display: flex; flex-direction: column; flex-shrink: 0; }
        
        .chat-header { padding: 16px; border-bottom: var(--border-subtle); font-weight: 700; color: var(--text-header); display: flex; align-items: center; gap: 8px; font-size: 15px; }
        
        .pinned-msg { background: rgba(88, 101, 242, 0.1); border-bottom: var(--border-subtle); padding: 12px 16px; font-size: 13px; color: var(--text-normal); display: none; align-items: center; gap: 10px; border-left: 3px solid var(--blurple); }
        
        .chat-area { flex: 1; overflow-y: auto; padding: 16px 8px 16px 16px; display: flex; flex-direction: column; gap: 4px; }
        
        /* Discord Message Look */
        .dc-msg { padding: 4px 8px; border-radius: 4px; font-size: 14px; line-height: 1.4; color: var(--text-normal); transition: 0.1s; display: flex; gap: 10px; word-wrap: break-word; }
        .dc-msg:hover { background: var(--bg-hover); cursor: context-menu; }
        .dc-msg .avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--blurple); display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; flex-shrink: 0; font-weight: bold; }
        .dc-msg strong { color: var(--text-header); font-weight: 600; cursor: pointer; }
        .dc-msg strong:hover { text-decoration: underline; }
        .dc-msg.system { color: var(--green); }
        
        .chat-input-wrapper { padding: 16px; background: var(--bg-panel); border-top: var(--border-subtle); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
        .dc-input-box { background: var(--bg-active); border-radius: 8px; display: flex; align-items: center; padding: 0 12px; }
        .dc-input { flex: 1; background: transparent; border: none; color: var(--text-normal); padding: 12px 0; font-size: 14px; outline: none; }
        .dc-input::placeholder { color: var(--text-muted); }
        
        /* === BUTTONS === */
        .btn-blurple { background: var(--blurple); color: white; border: none; padding: 10px 16px; border-radius: 4px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-blurple:hover { background: var(--blurple-hover); }
        .btn-blurple:active { transform: scale(0.96); }
        .btn-green { background: var(--green); }
        .btn-green:hover { background: #1e8f4c; }

        /* === MAC/DISCORD CONTEXT MENU === */
        .glass-context { position: fixed; background: rgba(17, 18, 20, 0.9); backdrop-filter: var(--glass-blur); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 6px; min-width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); z-index: 10000; display: none; opacity: 0; transform: scale(0.95); transition: 0.15s var(--easing); }
        .glass-context.active { display: flex; flex-direction: column; opacity: 1; transform: scale(1); }
        .ctx-item { padding: 8px 10px; color: var(--text-normal); font-size: 13px; font-weight: 500; border-radius: 4px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.1s; }
        .ctx-item:hover { background: var(--blurple); color: white; }
        .ctx-item.danger:hover { background: var(--red); color: white; }
        .ctx-item i { width: 16px; text-align: center; font-size: 14px; }
        .ctx-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 0; }

        /* === DISCORD PROFILE MODAL === */
        #profile-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 20000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.2s; }
        #profile-modal.show { display: flex; opacity: 1; }
        .dc-profile-card { background: #232428; border-radius: 8px; width: 300px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: scale(0.95); transition: 0.2s var(--easing); }
        #profile-modal.show .dc-profile-card { transform: scale(1); }
        .dc-banner { height: 60px; background: var(--blurple); }
        .dc-avatar-wrapper { margin-top: -30px; padding: 0 16px; }
        .dc-avatar { width: 64px; height: 64px; border-radius: 50%; border: 6px solid #232428; background: #1e1f22; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; font-weight: bold; }
        .dc-user-info { padding: 12px 16px 20px; }
        .dc-username { font-size: 20px; font-weight: 700; color: white; margin-bottom: 4px; }
        .dc-badges { display: flex; gap: 6px; margin-bottom: 16px; }
        .dc-badge { background: #1e1f22; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .dc-actions { border-top: 1px solid rgba(255,255,255,0.06); padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-dc-sec { background: #4e5058; color: white; border: none; padding: 8px; border-radius: 4px; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-dc-sec:hover { background: #6d6f78; }

        /* Mac Toast */
        .mac-toast { position: fixed; top: 20px; right: 20px; background: var(--bg-panel); backdrop-filter: var(--glass-blur); border: var(--border-subtle); padding: 16px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: 0.4s var(--easing); z-index: 30000; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .mac-toast.show { transform: translateX(0); }
    </style>
</head>
<body>

<div id="mac-toast" class="mac-toast"><i class="fas fa-bell" style="color:var(--blurple)"></i> <span id="toast-msg"></span></div>

<div id="mac-context-menu" class="glass-context">
    <div class="ctx-item" id="ctx-open-profile"><i class="fas fa-user"></i> Profil ansehen</div>
    <div class="ctx-item" id="ctx-pin"><i class="fas fa-thumbtack"></i> Nachricht anheften</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" id="ctx-mod" style="color:var(--green)"><i class="fas fa-shield"></i> Moderator machen</div>
    <div class="ctx-item" id="ctx-timeout" style="color:#faa61a"><i class="fas fa-clock"></i> Timeout (5 Min)</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" id="ctx-delete"><i class="fas fa-trash"></i> Nachricht löschen</div>
    <div class="ctx-item danger" id="ctx-ban"><i class="fas fa-ban"></i> Aus Stream bannen</div>
</div>

<div id="profile-modal" onclick="if(event.target===this) this.classList.remove('show')">
    <div class="dc-profile-card">
        <div class="dc-banner"></div>
        <div class="dc-avatar-wrapper">
            <div class="dc-avatar" id="pm-avatar">U</div>
        </div>
        <div class="dc-user-info">
            <div class="dc-username" id="pm-name">Username</div>
            <div class="dc-badges"><div class="dc-badge" id="pm-role">Zuschauer</div></div>
        </div>
        <div class="dc-actions">
            <button class="btn-dc-sec" onclick="macToast('Nachricht gesendet')">Flüstern</button>
            <button class="btn-dc-sec" id="pm-btn-mod" style="color:var(--green)">Mod</button>
            <button class="btn-dc-sec" id="pm-btn-timeout" style="color:#faa61a">Timeout</button>
            <button class="btn-dc-sec" id="pm-btn-ban" style="background:var(--red)">Bann</button>
        </div>
    </div>
</div>

<div class="studio-wrapper">
    <aside class="sidebar-left glass-panel" id="left-sidebar">
        <div class="discord-header">
            <h1><img src="https://i.imgur.com/JDPRzCc.png"> Phil Studio</h1>
        </div>
        
        <div class="section-label">Voice & Video</div>
        <div class="discord-item active" data-scene="cam" onclick="switchScene('cam')">
            <i class="fas fa-video"></i> Kamera
        </div>
        <div class="discord-item" data-scene="screen" onclick="switchScene('screen')">
            <i class="fas fa-display"></i> Bildschirm
        </div>

        <div class="section-label" style="margin-top:24px;">Soundboard</div>
        <div class="sound-grid">
            <button class="sound-btn" onclick="playEffect('applaus')"><i class="fas fa-hands-clapping"></i> Applaus</button>
            <button class="sound-btn" onclick="playEffect('airhorn')"><i class="fas fa-bullhorn"></i> Airhorn</button>
            <button class="sound-btn" onclick="playEffect('laugh')"><i class="fas fa-face-laugh-squint"></i> Lachen</button>
            <button class="sound-btn" onclick="playEffect('wow')"><i class="fas fa-star"></i> Wow</button>
        </div>

        <div style="margin-top: auto;">
            <button id="master-live-btn" class="btn-blurple"><i class="fas fa-satellite-dish"></i> Stream Starten</button>
        </div>
    </aside>

    <main class="main-stage glass-panel">
        <div class="live-badge" id="live-dot"><i class="fas fa-circle" style="font-size:8px;"></i> LIVE</div>
        
        <div class="stage-header">
            <div class="stat-pill"><i class="fas fa-eye" style="color:var(--text-muted)"></i> <span id="stat-viewers">0</span></div>
            <div class="stat-pill"><i class="fas fa-coins" style="color:#faa61a"></i> <span id="stat-coins">0</span></div>
            <div class="stat-pill"><i class="fas fa-clock" style="color:var(--text-muted)"></i> <span id="stat-duration">00:00</span></div>
        </div>

        <video id="studio-preview" autoplay muted playsinline></video>
        
        <div class="voice-controls">
            <button class="vc-btn" id="toggle-mic" onclick="toggleMic()" title="Mikrofon (M)"><i class="fas fa-microphone"></i></button>
            <button class="vc-btn" id="toggle-vid" onclick="toggleVid()" title="Kamera (V)"><i class="fas fa-video"></i></button>
            <div style="width:1px; background:var(--border-subtle); margin: 0 4px;"></div>
            <button class="vc-btn" onclick="toggleCinema()" title="Kino Modus (F)"><i class="fas fa-expand"></i></button>
            <button class="vc-btn" onclick="requestPiP()" title="Abkoppeln (P)"><i class="fas fa-clone"></i></button>
            <button class="vc-btn" onclick="clearChat()" title="Chat leeren"><i class="fas fa-broom"></i></button>
        </div>
    </main>

    <aside class="sidebar-right glass-panel" id="right-sidebar">
        <div class="chat-header">
            <i class="fas fa-hashtag" style="color:var(--text-muted)"></i> live-chat
        </div>
        
        <div id="pinned-msg-bar" class="pinned-msg">
            <i class="fas fa-thumbtack"></i> <span id="pinned-text" style="flex:1;"></span> 
            <i class="fas fa-times" style="cursor:pointer; color:var(--text-muted);" onclick="document.getElementById('pinned-msg-bar').style.display='none'"></i>
        </div>
        
        <div id="studio-chat" class="chat-area"></div>
        
        <div class="chat-input-wrapper">
            <div class="dc-input-box">
                <input type="text" id="studio-chat-input" class="dc-input" placeholder="Nachricht an #live-chat">
                <i class="fas fa-paper-plane" style="color:var(--text-muted); cursor:pointer;" onclick="sendHostMessage()"></i>
            </div>
        </div>
    </aside>
</div>

<script type="module" src="studio.js"></script>
</body>
</html>
